<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>To-Do List</title>
   <link rel="stylesheet" href="dist/style.css">
</head>
<body>
   <main>
      <h1>To-Do List</h1>

      <label for="new-task">New task:</label>
      <input type="text" id="new-task" value="Complete JavaScript lab">
      <button id="add-btn">Add</button>

      <ol>
         <li>
            <span class="task-text">Clean bathroom</span>
            <button class="done-btn">&#10006;</button>
         </li>
         <li>
            <span class="task-text">Study for big exam</span>
            <button class="done-btn">&#10006;</button>
         </li>
         <li>
            <span class="task-text">Feed fish</span>
            <button class="done-btn">&#10006;</button>
         </li>
      </ol>
   </main>

   <script src="dist/script.js"></script>
</body>
</html>
